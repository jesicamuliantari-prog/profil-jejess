<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Jesica ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-decorations">
        <div class="bubble bubble1"></div>
        <div class="bubble bubble2"></div>
        <div class="bubble bubble3"></div>
        <div class="bubble bubble4"></div>
        <div class="bubble bubble5"></div>
        <div class="star star1"><i class="fas fa-star"></i></div>
        <div class="star star2"><i class="fas fa-heart"></i></div>
        <div class="star star3"><i class="fas fa-sparkles"></i></div>
    </div>
    
    <div class="profile-card">
        <div class="ribbon">🎀 J E S I C A 🎀</div>
        <div class="profile-header">
            <div class="avatar-container">
                <img src="sunwoow.jpeg" alt="Avatar Jesica" class="avatar" id="avatarImg">
            </div>
            <h1>Ni Putu Jesica Muliantari Giri</h1>
            <p class="subtitle">17 Tahun | Sweet Girl 💖</p>
        </div>
        
        <div class="profile-body">
            <div class="info-group">
                <div class="info-item">
                    <i class="fas fa-birthday-cake id-icon"></i>
                    <div>
                        <span class="label">Date of Birth</span>
                        <span class="value aesthetic-pink">12 Sep 2008</span>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-star id-icon"></i>
                    <div>
                        <span class="label">Zodiac Sign</span>
                        <span class="value font-bold">Virgo ♍</span>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-school id-icon school-icon"></i>
                    <div>
                        <span class="label">Education</span>
                        <span class="value aesthetic-school">SMA NEGERI 2 MENGWI</span>
                    </div>
                </div>
            </div>

            <div class="quote-container">
                <p class="aesthetic-quote">"Always blooming, always glowing. Menjadi versi terbaik diriku setiap hari." 🌸✨</p>
            </div>

            <div class="hobbies-section">
                <h3><i class="fas fa-heart"></i> My Favorites</h3>
                <div class="tags">
                    <span class="tag k-drama"><i class="fas fa-tv"></i> Nonton K-Drama</span>
                    <span class="tag k-pop"><i class="fas fa-music"></i> Suka K-Pop</span>
                    <span class="tag cute"><i class="fas fa-ice-cream"></i> Sweet Things</span>
                    <span class="tag sunwoo"><i class="fas fa-heart" style="color:red"></i> ILOVESUNWOO</span>
                </div>
            </div>


            
            <button class="greeting-btn" id="greetingBtn">Sapa Jesica! ✨</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
